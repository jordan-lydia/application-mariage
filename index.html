<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dan & Tina | Bar Mariage - Gestion & Statistiques</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Chart.js pour les statistiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #1a120b;
            min-height: 100vh;
        }

        .wedding-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.65) 0%, rgba(40,25,15,0.8) 100%), url('dan.jpeg');
            background-size: cover;
            background-position: center 30%;
            z-index: -2;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 12px;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }

        .nav-simple {
            display: flex;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 5px;
            margin: 8px 0 12px;
            gap: 5px;
        }

        .nav-btn {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: #FFE8D6;
            background: transparent;
            border: none;
        }

        .nav-btn i { margin-right: 5px; }
        .nav-btn.active { background: #D4AF37; color: #2C1810; }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cartes */
        .glass-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .welcome-card {
            text-align: center;
            padding: 40px 20px;
        }
        .couple-name { font-family: 'Georgia', serif; font-size: 2rem; color: #FFE8C7; }
        .couple-name span { color: #D4AF37; font-size: 2.3rem; }

        /* Stats Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(212,175,55,0.15);
            border-radius: 20px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(212,175,55,0.3);
        }
        .stat-number { font-size: 1.6rem; font-weight: bold; color: #D4AF37; }
        .stat-label { font-size: 0.7rem; color: #FFE8C7; }

        .chart-container {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 15px;
            margin: 15px 0;
        }
        canvas { max-height: 200px; width: 100%; }

        /* Historique */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            background: rgba(255,255,240,0.08);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .history-detail { flex: 1; }
        .history-name { font-weight: bold; color: #FFE8C7; }
        .history-meta { font-size: 0.7rem; color: #D4AF37; margin-top: 4px; }

        /* Stock Management */
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stock-item {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stock-info h4 { color: #FFE8C7; font-size: 0.95rem; }
        .stock-info p { font-size: 0.7rem; color: #D4AF37; }
        .stock-quantity { font-weight: bold; color: #D4AF37; font-size: 1.2rem; margin: 0 15px; }
        .stock-actions button {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            padding: 5px 8px;
        }

        /* Tables scroll */
        .table-scroll {
            overflow-x: auto;
            white-space: nowrap;
            margin-bottom: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .table-buttons { display: inline-flex; gap: 8px; padding: 4px; }
        .table-btn {
            background: rgba(212,175,55,0.2);
            border: 1px solid rgba(212,175,55,0.5);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            display: inline-block;
            color: #FFE8C7;
        }
        .table-btn.active-table { background: #D4AF37; color: #2C1810; }

        .menu-categories {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }
        .menu-cat {
            background: rgba(0,0,0,0.5);
            text-align: center;
            padding: 10px 4px;
            border-radius: 16px;
            cursor: pointer;
        }
        .menu-cat i { color: #D4AF37; font-size: 1.1rem; display: block; }
        .menu-cat span { font-size: 0.65rem; color: #FFE8C7; }
        .menu-cat.active-menu { background: #D4AF37; }
        .menu-cat.active-menu i, .menu-cat.active-menu span { color: #2C1810; }

        .drinks-list { max-height: 280px; overflow-y: auto; }
        .drink-item {
            background: rgba(255,255,240,0.08);
            padding: 12px;
            margin-bottom: 6px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }
        .cart-preview {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 12px;
            margin-top: 12px;
        }
        .btn-gold {
            background: #D4AF37;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #2C2418;
            border-radius: 28px;
            padding: 24px;
            width: 100%;
            max-width: 350px;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid #D4AF37;
            border-radius: 30px;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #D4AF37;
            color: #2C1810;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            z-index: 1000;
        }
        .login-box { text-align: center; padding: 20px; }
        .login-box input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,240,0.15);
            border: 1px solid #D4AF37;
            border-radius: 40px;
            color: white;
            margin: 10px 0;
        }
        .tab-subnav {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(212,175,55,0.3);
            padding-bottom: 10px;
        }
        .subtab {
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #FFE8C7;
        }
        .subtab.active-sub { background: #D4AF37; color: #2C1810; }
        footer { text-align: center; padding: 16px; font-size: 0.7rem; color: #aa9f84; }
    </style>
</head>
<body>
<div class="wedding-bg"></div>
<div class="container">
    <div class="nav-simple">
        <button class="nav-btn active" data-page="home"><i class="fas fa-home"></i> Accueil</button>
        <button class="nav-btn" data-page="order"><i class="fas fa-glass-cheers"></i> Commander</button>
        <button class="nav-btn" data-page="admin"><i class="fas fa-chart-line"></i> Gestion</button>
    </div>

    <!-- ACCUEIL -->
    <div id="homePage" class="page active-page">
        <div class="glass-card welcome-card">
            <div class="couple-name">DAN <span>&</span> TINA</div>
            <div style="margin: 20px 0; color:#FFE8C7;">Bienvenue à notre mariage</div>
            <button class="btn-gold" id="startOrderBtn"><i class="fas fa-champagne-glasses"></i> Commander</button>
        </div>
        <footer>Dan & Tina · 1er Avril 2026</footer>
    </div>

    <!-- COMMANDE -->
    <div id="orderPage" class="page">
        <div class="glass-card">
            <div class="table-scroll">
                <div class="table-buttons" id="tableButtons"></div>
            </div>
            <div class="menu-categories">
                <div class="menu-cat active-menu" data-menu="alcool"><i class="fas fa-beer"></i><span>Bières</span></div>
                <div class="menu-cat" data-menu="sucree"><i class="fas fa-candy-cane"></i><span>Sucrées</span></div>
                <div class="menu-cat" data-menu="whisky"><i class="fas fa-whiskey-glass"></i><span>Whisky</span></div>
                <div class="menu-cat" data-menu="vin"><i class="fas fa-wine-glass"></i><span>Vins</span></div>
                <div class="menu-cat" data-menu="eaux"><i class="fas fa-tint"></i><span>Eaux</span></div>
            </div>
            <div class="drinks-list" id="drinksList"></div>
            <div class="cart-preview">
                <div class="cart-title"><i class="fas fa-shopping-basket"></i> Ma commande</div>
                <div id="cartItems">Aucune boisson</div>
                <button id="confirmOrderBtn" class="btn-gold"><i class="fas fa-check"></i> Confirmer</button>
            </div>
        </div>
    </div>

    <!-- GESTION (Admin) -->
    <div id="adminPage" class="page">
        <div class="glass-card">
            <div id="adminLoginArea">
                <div class="login-box">
                    <i class="fas fa-lock" style="font-size: 2rem; color:#D4AF37;"></i>
                    <input type="password" id="adminPassword" placeholder="Mot de passe">
                    <button id="loginBtn" class="btn-gold">Accéder</button>
                </div>
            </div>
            <div id="adminDashboardArea" style="display:none;">
                <!-- Sous-navigation Gestion -->
                <div class="tab-subnav">
                    <div class="subtab active-sub" data-subtab="stats">📊 Stats & Stock</div>
                    <div class="subtab" data-subtab="history">📜 Historique</div>
                    <div class="subtab" data-subtab="products">🍾 Gestion produits</div>
                </div>

                <!-- STATISTIQUES & STOCK -->
                <div id="statsTab" class="subtab-content">
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Commandes</div></div>
                        <div class="stat-card"><div class="stat-number" id="totalDrinks">0</div><div class="stat-label">Boissons servies</div></div>
                        <div class="stat-card"><div class="stat-number" id="tablesServed">0</div><div class="stat-label">Tables servies</div></div>
                    </div>
                    <div class="chart-container"><canvas id="topDrinksChart"></canvas></div>
                    
                    <h4 style="color:#D4AF37; margin:15px 0 10px;"><i class="fas fa-boxes"></i> Stock initial & Suivi</h4>
                    <div id="stockList" class="history-list" style="max-height: 250px;"></div>
                    <button id="initStockBtn" class="btn-gold" style="margin-top:10px; background:#2c5e2e;"><i class="fas fa-database"></i> Initialiser / Réinitialiser le stock</button>
                </div>

                <!-- HISTORIQUE EN TEMPS RÉEL -->
                <div id="historyTab" class="subtab-content" style="display:none;">
                    <h4 style="color:#D4AF37; margin-bottom:10px;"><i class="fas fa-clock"></i> Historique des commandes</h4>
                    <div id="historyList" class="history-list" style="max-height: 400px;"></div>
                </div>

                <!-- GESTION PRODUITS (CRUD) -->
                <div id="productsTab" class="subtab-content" style="display:none;">
                    <div class="stock-header">
                        <h4 style="color:#D4AF37;"><i class="fas fa-edit"></i> Produits</h4>
                        <button id="addProductGlobalBtn" class="btn-gold" style="background:#27AE60; padding:8px 16px; width:auto;">+ Ajouter</button>
                    </div>
                    <div id="productsManageList" class="history-list" style="max-height: 350px;"></div>
                </div>

                <button id="logoutAdmin" class="btn-gold" style="margin-top:15px; background:#e67e22;"><i class="fas fa-sign-out-alt"></i> Quitter</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBWyJKgpzjajwaIj7qJnYqe0mA1a5tnKok",
        authDomain: "application-dan-93c76.firebaseapp.com",
        projectId: "application-dan-93c76",
        storageBucket: "application-dan-93c76.firebasestorage.app",
        messagingSenderId: "320857345541",
        appId: "1:320857345541:web:1179185b59e6539275966c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // MENU PAR DÉFAUT RDC
    const DEFAULT_DRINKS = {
        alcool: [{ name: "Primus", brand: "Bralima" }, { name: "Mutzig", brand: "Brasimba" }, { name: "Turbo King", brand: "Bralima" }, { name: "Beaufort", brand: "Brasimba" }, { name: "Castel", brand: "Castel" }, { name: "Heineken", brand: "Heineken" }, { name: "Legend", brand: "Bralima" }, { name: "Class", brand: "Bralima" }, { name: "Skol", brand: "Bralima" }, { name: "DOGGO", brand: "Brasimba" }],
        sucree: [{ name: "Coca-Cola", brand: "Bralima" }, { name: "Fanta Orange", brand: "Bralima" }, { name: "Fanta Citron", brand: "Bralima" }, { name: "Sprite", brand: "Bralima" }, { name: "Maltina", brand: "Nestlé" }, { name: "Energy Malt", brand: "Bralima" }, { name: "Vitalo", brand: "Brasimba" }, { name: "Tonic", brand: "Schweppes" }, { name: "Jus d'Orange", brand: "Fruitex" }, { name: "Jus de Mangue", brand: "Fruitex" }],
        whisky: [{ name: "Johnnie Walker Red", brand: "Whisky" }, { name: "Johnnie Walker Black", brand: "Whisky" }, { name: "Jameson", brand: "Whisky" }, { name: "Jack Daniel's", brand: "Whisky" }, { name: "Ballantine's", brand: "Whisky" }, { name: "Chivas Regal", brand: "Whisky" }],
        vin: [{ name: "Vin Rouge Cabernet", brand: "Castel" }, { name: "Vin Blanc Chardonnay", brand: "Castel" }, { name: "Vin Rosé", brand: "Castel" }, { name: "Champagne Moët", brand: "Champagne" }, { name: "Champagne Demi-sec", brand: "Veuve" }],
        eaux: [{ name: "Eau Vive", brand: "Bralima" }, { name: "Eau Cristalline", brand: "Brasimba" }, { name: "Eau gazeuse", brand: "Schweppes" }, { name: "Eau minérale", brand: "Safina" }]
    };

    let currentMenu = "alcool", currentTable = 1, cart = [], adminLogged = false;
    let topDrinksChart = null;
    const ADMIN_PASS = "dantina2026";

    // Générer tables 1-30
    function genTables() {
        const container = document.getElementById('tableButtons');
        let html = '';
        for (let i = 1; i <= 30; i++) html += `<div class="table-btn" data-table="${i}">T${i}</div>`;
        container.innerHTML = html;
        document.querySelectorAll('.table-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active-table'));
                btn.classList.add('active-table');
                currentTable = parseInt(btn.dataset.table);
            });
        });
        if(document.querySelector('.table-btn')) document.querySelector('.table-btn').classList.add('active-table');
    }

    // Afficher les boissons depuis Firestore
    async function displayDrinks() {
        const snapshot = await db.collection('drinks').where('category', '==', currentMenu).get();
        let drinks = [];
        if (!snapshot.empty) drinks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        else drinks = DEFAULT_DRINKS[currentMenu] || [];
        
        const container = document.getElementById('drinksList');
        container.innerHTML = drinks.map(d => `<div class="drink-item" data-name="${d.name}"><span>${d.name}</span><span><i class="fas fa-plus-circle" style="color:#D4AF37;"></i></span></div>`).join('');
        document.querySelectorAll('.drink-item').forEach(el => {
            el.addEventListener('click', () => { addToCart(el.dataset.name); showToast(`✓ ${el.dataset.name}`, 800); });
        });
    }

    function addToCart(name) { let exist = cart.find(i => i.name === name); if(exist) exist.quantity++; else cart.push({ name, quantity: 1 }); updateCart(); }
    function updateCart() {
        const container = document.getElementById('cartItems');
        if (!cart.length) { container.innerHTML = '<div style="color:#aaa;">Aucune boisson</div>'; return; }
        container.innerHTML = cart.map((item, idx) => `<div style="display:flex; justify-content:space-between; margin:5px 0;">${item.name} x${item.quantity} <button class="remove-item" data-idx="${idx}" style="background:none; border:none; color:#ff8866;">🗑️</button></div>`).join('');
        document.querySelectorAll('.remove-item').forEach(btn => { btn.onclick = () => { cart.splice(parseInt(btn.dataset.idx),1); updateCart(); }; });
    }

    async function confirmOrder() {
        if (!cart.length) { showToast("Ajoutez des boissons", 1000); return; }
        const items = cart.map(i => ({ name: i.name, quantity: i.quantity }));
        await db.collection('orders').add({ table: currentTable, items, status: "pending", timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        // Mettre à jour le stock en temps réel (décrémenter)
        for (let item of cart) {
            const stockRef = db.collection('stock').where('name', '==', item.name);
            const snap = await stockRef.get();
            if (!snap.empty) {
                const doc = snap.docs[0];
                let newQty = (doc.data().quantity || 0) - item.quantity;
                await db.collection('stock').doc(doc.id).update({ quantity: Math.max(0, newQty) });
            }
        }
        showToast(`✅ Table ${currentTable} commandée !`, 1500);
        cart = []; updateCart();
    }

    // ========== ADMIN : STOCK, STATS, HISTORIQUE ==========
    async function initStock() {
        const products = await db.collection('drinks').get();
        if (products.empty) return;
        for (let prod of products.docs) {
            const exists = await db.collection('stock').where('name', '==', prod.data().name).get();
            if (exists.empty) {
                await db.collection('stock').add({ name: prod.data().name, category: prod.data().category, quantity: 50, initialQty: 50 });
            }
        }
        showToast("Stock initialisé (50 par défaut)", 1500);
        loadStockAndStats();
    }

    async function loadStockAndStats() {
        const stockSnap = await db.collection('stock').get();
        const container = document.getElementById('stockList');
        if (stockSnap.empty) { container.innerHTML = '<div style="color:#aaa;">Aucun stock, cliquez sur "Initialiser"</div>'; return; }
        let html = '';
        for (let doc of stockSnap.docs) {
            const data = doc.data();
            const consumed = (data.initialQty || data.quantity || 0) - (data.quantity || 0);
            html += `<div class="stock-item"><div><strong style="color:#FFE8C7;">${data.name}</strong><br><span style="font-size:0.7rem;">Restant: ${data.quantity || 0}</span></div><div style="color:#D4AF37;">Consommé: ${consumed}</div></div>`;
        }
        container.innerHTML = html;

        // Statistiques
        const ordersSnap = await db.collection('orders').get();
        let totalDrinks = 0, tablesSet = new Set();
        ordersSnap.forEach(o => { totalDrinks += (o.data().items || []).reduce((s,i)=>s+i.quantity,0); tablesSet.add(o.data().table); });
        document.getElementById('totalOrders').innerText = ordersSnap.size;
        document.getElementById('totalDrinks').innerText = totalDrinks;
        document.getElementById('tablesServed').innerText = tablesSet.size;

        // Top boissons
        let drinkCount = {};
        ordersSnap.forEach(o => { (o.data().items || []).forEach(i => { drinkCount[i.name] = (drinkCount[i.name] || 0) + i.quantity; }); });
        let sorted = Object.entries(drinkCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
        if (topDrinksChart) topDrinksChart.destroy();
        const ctx = document.getElementById('topDrinksChart').getContext('2d');
        topDrinksChart = new Chart(ctx, { type: 'bar', data: { labels: sorted.map(s=>s[0]), datasets: [{ label: 'Quantité', data: sorted.map(s=>s[1]), backgroundColor: '#D4AF37' }] }, options: { responsive: true, maintainAspectRatio: true } });
    }

    async function loadHistory() {
        const orders = await db.collection('orders').orderBy('timestamp', 'desc').get();
        const container = document.getElementById('historyList');
        if (orders.empty) { container.innerHTML = '<div style="color:#aaa;">Aucune commande</div>'; return; }
        let html = '';
        orders.forEach(doc => {
            const o = doc.data();
            const time = o.timestamp?.toDate().toLocaleTimeString() || '';
            html += `<div class="history-item"><div class="history-detail"><div class="history-name">Table ${o.table}</div><div class="history-meta">${time}</div></div><div style="text-align:right;">${o.items.map(i=>`${i.name} x${i.quantity}`).join('<br>')}</div></div>`;
        });
        container.innerHTML = html;
    }

    async function loadProductsManage() {
        const products = await db.collection('drinks').get();
        const container = document.getElementById('productsManageList');
        if (products.empty) { container.innerHTML = '<div style="color:#aaa;">Aucun produit</div>'; return; }
        let html = '';
        products.forEach(doc => {
            const p = doc.data();
            html += `<div class="stock-item"><div><h4>${p.name}</h4><p>${p.category} • ${p.brand || ''}</p></div><div><button class="edit-prod" data-id="${doc.id}" data-name="${p.name}" data-brand="${p.brand||''}" data-cat="${p.category}" style="background:none; color:#F39C12;"><i class="fas fa-edit"></i></button><button class="delete-prod" data-id="${doc.id}" style="background:none; color:#E74C3C;"><i class="fas fa-trash"></i></button></div></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.edit-prod').forEach(btn => btn.onclick = () => openEditProduct(btn.dataset.id, btn.dataset.name, btn.dataset.brand, btn.dataset.cat));
        document.querySelectorAll('.delete-prod').forEach(btn => btn.onclick = async () => { if(confirm("Supprimer ?")) { await db.collection('drinks').doc(btn.dataset.id).delete(); loadProductsManage(); displayDrinks(); showToast("Supprimé",1000); } });
    }

    function openAddProduct() {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3 style="color:#D4AF37;">Ajouter</h3><input id="prodName" placeholder="Nom"><input id="prodBrand" placeholder="Marque"><select id="prodCat"><option value="alcool">Bières</option><option value="sucree">Sucrées</option><option value="whisky">Whisky</option><option value="vin">Vins</option><option value="eaux">Eaux</option></select><div class="modal-buttons" style="display:flex; gap:10px; margin-top:15px;"><button id="saveProd" style="background:#27AE60;">Ajouter</button><button id="closeModal">Annuler</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('saveProd').onclick = async () => {
            const name = document.getElementById('prodName').value.trim();
            if(!name) return;
            await db.collection('drinks').add({ name, brand: document.getElementById('prodBrand').value, category: document.getElementById('prodCat').value });
            await db.collection('stock').add({ name, quantity: 50, initialQty: 50, category: document.getElementById('prodCat').value });
            modal.remove(); loadProductsManage(); displayDrinks(); loadStockAndStats(); showToast("Ajouté",1000);
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }

    function openEditProduct(id, oldName, oldBrand, oldCat) {
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>Modifier</h3><input id="prodName" value="${oldName}"><input id="prodBrand" value="${oldBrand}"><select id="prodCat"><option ${oldCat==='alcool'?'selected':''} value="alcool">Bières</option><option ${oldCat==='sucree'?'selected':''} value="sucree">Sucrées</option><option ${oldCat==='whisky'?'selected':''} value="whisky">Whisky</option><option ${oldCat==='vin'?'selected':''} value="vin">Vins</option><option ${oldCat==='eaux'?'selected':''} value="eaux">Eaux</option></select><div style="display:flex; gap:10px; margin-top:15px;"><button id="updateProd" style="background:#F39C12;">Modifier</button><button id="closeModal">Annuler</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('updateProd').onclick = async () => {
            await db.collection('drinks').doc(id).update({ name: document.getElementById('prodName').value, brand: document.getElementById('prodBrand').value, category: document.getElementById('prodCat').value });
            modal.remove(); loadProductsManage(); displayDrinks(); showToast("Modifié",1000);
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }

    // Écoute en temps réel pour mettre à jour stats et historique
    function realtimeUpdates() {
        db.collection('orders').onSnapshot(() => { if(adminLogged){ loadStockAndStats(); loadHistory(); } });
        db.collection('stock').onSnapshot(() => { if(adminLogged) loadStockAndStats(); });
    }

    function showToast(msg, dur=1500) { let t=document.querySelector('.toast'); if(t) t.remove(); let toast=document.createElement('div'); toast.className='toast'; toast.innerText=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(),dur); }

    // Navigation
    function initNav() {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
                document.getElementById(btn.dataset.page+'Page').classList.add('active-page');
                if(btn.dataset.page === 'admin') {
                    document.getElementById('adminLoginArea').style.display = adminLogged ? 'none' : 'block';
                    document.getElementById('adminDashboardArea').style.display = adminLogged ? 'block' : 'none';
                    if(adminLogged){ loadStockAndStats(); loadHistory(); loadProductsManage(); }
                }
            };
        });
        document.getElementById('startOrderBtn').onclick = () => document.querySelector('[data-page="order"]').click();
    }

    // Sous-onglets gestion
    function initSubTabs() {
        document.querySelectorAll('.subtab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.subtab').forEach(t=>t.classList.remove('active-sub'));
                tab.classList.add('active-sub');
                document.querySelectorAll('.subtab-content').forEach(c=>c.style.display='none');
                document.getElementById(tab.dataset.subtab+'Tab').style.display = 'block';
            };
        });
    }

    window.addEventListener('DOMContentLoaded', async () => {
        genTables(); await displayDrinks(); updateCart();
        document.getElementById('confirmOrderBtn').onclick = confirmOrder;
        document.querySelectorAll('.menu-cat').forEach(cat => {
            cat.onclick = () => {
                document.querySelectorAll('.menu-cat').forEach(c=>c.classList.remove('active-menu'));
                cat.classList.add('active-menu');
                currentMenu = cat.dataset.menu;
                displayDrinks();
            };
        });
        initNav(); initSubTabs();

        // Admin login
        document.getElementById('loginBtn').onclick = () => {
            if(document.getElementById('adminPassword').value === ADMIN_PASS) {
                adminLogged = true;
                document.getElementById('adminLoginArea').style.display = 'none';
                document.getElementById('adminDashboardArea').style.display = 'block';
                loadStockAndStats(); loadHistory(); loadProductsManage(); realtimeUpdates();
                showToast("Bienvenue gestionnaire", 1500);
            } else showToast("Mot de passe incorrect", 1000);
        };
        document.getElementById('logoutAdmin').onclick = () => { adminLogged = false; location.reload(); };
        document.getElementById('initStockBtn').onclick = initStock;
        document.getElementById('addProductGlobalBtn').onclick = openAddProduct;

        // Initialisation auto si vide
        const drinksCheck = await db.collection('drinks').limit(1).get();
        if(drinksCheck.empty) {
            for(let cat in DEFAULT_DRINKS) {
                for(let d of DEFAULT_DRINKS[cat]) await db.collection('drinks').add({ ...d, category: cat });
            }
        }
        showToast("🥂 Bienvenue au mariage !", 2000);
    });
</script>
</body>
</html>
