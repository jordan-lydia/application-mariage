<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dan & Tina | Bar du Mariage - Gestion Complète</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #1a120b;
            min-height: 100vh;
            position: relative;
        }

        .wedding-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(40,25,15,0.75) 100%), url('dan.jpeg');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            z-index: -2;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 12px;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }

        /* Navigation */
        .nav-simple {
            display: flex;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 5px;
            margin: 8px 0 12px;
            gap: 5px;
        }

        .nav-btn {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: #FFE8D6;
            background: transparent;
            border: none;
            font-family: inherit;
        }

        .nav-btn i {
            margin-right: 6px;
            font-size: 0.8rem;
        }

        .nav-btn.active {
            background: #D4AF37;
            color: #2C1810;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active-page {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Page Accueil */
        .welcome-card {
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 35px 20px;
            text-align: center;
            margin-top: 30px;
        }

        .couple-name {
            font-family: 'Georgia', serif;
            font-size: 2.2rem;
            color: #FFE8C7;
            margin-bottom: 15px;
        }

        .couple-name span {
            color: #D4AF37;
            font-size: 2.5rem;
        }

        .welcome-message {
            color: #FFF0DC;
            margin: 20px 0;
            line-height: 1.5;
        }

        .btn-start {
            background: #D4AF37;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            color: #2C1810;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }

        /* Sélecteur de tables avec défilement */
        .table-scroll {
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .table-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .table-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 10px;
        }

        .table-buttons {
            display: inline-flex;
            gap: 8px;
            padding: 4px;
        }

        .table-btn {
            background: rgba(212,175,55,0.2);
            border: 1px solid rgba(212,175,55,0.5);
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: bold;
            color: #FFE8C7;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            font-size: 0.9rem;
        }

        .table-btn.active-table {
            background: #D4AF37;
            color: #2C1810;
            border-color: #D4AF37;
        }

        /* Menus Catégories - 4 menus */
        .menu-categories {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .menu-cat {
            background: rgba(0,0,0,0.5);
            text-align: center;
            padding: 12px 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(212,175,55,0.3);
        }

        .menu-cat i {
            font-size: 1.3rem;
            color: #D4AF37;
            display: block;
            margin-bottom: 5px;
        }

        .menu-cat span {
            font-size: 0.7rem;
            font-weight: 500;
            color: #FFE8C7;
        }

        .menu-cat.active-menu {
            background: #D4AF37;
            border-color: #D4AF37;
        }

        .menu-cat.active-menu i,
        .menu-cat.active-menu span {
            color: #2C1810;
        }

        /* Liste des boissons */
        .drinks-list {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 4px;
        }

        .drink-item {
            background: rgba(255,255,240,0.08);
            padding: 14px 12px;
            margin-bottom: 8px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(212,175,55,0.2);
        }

        .drink-info {
            flex: 1;
        }

        .drink-name {
            font-weight: 600;
            color: #FFF5E8;
            font-size: 0.95rem;
        }

        .drink-brand {
            font-size: 0.7rem;
            color: #D4AF37;
            margin-top: 3px;
        }

        .drink-add {
            background: #D4AF37;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2C1810;
            font-weight: bold;
        }

        /* Panier */
        .cart-preview {
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 15px;
            margin-top: 10px;
        }

        .cart-title {
            color: #D4AF37;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .cart-items {
            max-height: 120px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(212,175,55,0.2);
            font-size: 0.85rem;
            color: #FFE8C7;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #ff8866;
            cursor: pointer;
            padding: 4px 8px;
        }

        .btn-command {
            background: #D4AF37;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }

        /* Admin Panel */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .add-product-btn {
            background: #27AE60;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .product-list {
            max-height: 60vh;
            overflow-y: auto;
        }

        .product-card {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-info h4 {
            color: #FFE8C7;
            font-size: 0.95rem;
        }

        .product-info p {
            font-size: 0.7rem;
            color: #D4AF37;
        }

        .product-actions button {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px 8px;
            margin: 0 3px;
        }

        .edit-btn { color: #F39C12; }
        .delete-btn { color: #E74C3C; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: #2C2418;
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 350px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid #D4AF37;
            border-radius: 30px;
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #D4AF37;
            color: #2C1810;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            z-index: 1000;
            white-space: nowrap;
        }

        .login-box {
            text-align: center;
            padding: 30px 20px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,240,0.15);
            border: 1px solid #D4AF37;
            border-radius: 50px;
            color: white;
            margin: 15px 0;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.7rem;
            color: #aa9f84;
        }
    </style>
</head>

    <!-- GESTION ADMIN -->
    <div id="adminPage" class="page">

                    <h3 style="color:#FFE8C7;">Espace Gestionnaire</h3>
                    <input type="password" id="adminPassword" placeholder="Mot de passe">
                    <button id="loginBtn" class="btn-command">Accéder</button>

            <div id="adminDashboardArea" style="display:none;">
                <div class="admin-header">
                    <h3 style="color:#D4AF37;"><i class="fas fa-edit"></i> Gestion des boissons</h3>
                    <button id="addProductBtn" class="add-product-btn"><i class="fas fa-plus"></i> Ajouter</button>
                </div>
                <div id="productList" class="product-list"></div>
                <hr style="margin: 20px 0; border-color: rgba(212,175,55,0.3);">
                <h3 style="color:#D4AF37; margin-bottom: 15px;"><i class="fas fa-clipboard-list"></i> Commandes reçues</h3>
                <div id="adminOrdersList" class="product-list" style="max-height: 300px;"></div>
                <button id="logoutAdmin" class="btn-command" style="margin-top: 15px; background:#e67e22;"><i class="fas fa-sign-out-alt"></i> Quitter</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    // MENU COMPLET RDC - 5 catégories

            { name: "Vitalo", brand: "Brasimba", category: "sucree" },
            { name: "Tonic", brand: "Schweppes", category: "sucree" },

        ],
        whisky: [
            { name: "Johnnie Walker Red Label", brand: "Whisky", category: "whisky" },
            { name: "Johnnie Walker Black Label", brand: "Whisky", category: "whisky" },
            { name: "Jameson", brand: "Whisky", category: "whisky" },
            { name: "Jack Daniel's", brand: "Whisky", category: "whisky" },

        ],
        vin: [

            { name: "Champagne Moët", brand: "Champagne", category: "vin" },
            { name: "Champagne Demi-sec", brand: "Veuve Clicquot", category: "vin" },
            { name: "Vin Rouge Merlot", brand: "Castel", category: "vin" },
            { name: "Vin Blanc Sauvignon", brand: "Castel", category: "vin" }
        ],
        eaux: [
            { name: "Eau Vive", brand: "Bralima", category: "eaux" },
            { name: "Eau Cristalline", brand: "Brasimba", category: "eaux" },
            { name: "Eau gazeuse", brand: "Schweppes", category: "eaux" },
            { name: "Eau pétillante", brand: "Perrier", category: "eaux" },
            { name: "Eau minérale", brand: "Safina", category: "eaux" }
        ]
    };

    let currentMenu = "alcool";
    let currentTable = 1;
    let cart = [];
    let adminLogged = false;
    const ADMIN_PASS = "dantina2026";

    // Générer les tables de 1 à 30
    function generateTableButtons() {
        const container = document.getElementById('tableButtons');
        let html = '';
        for (let i = 1; i <= 30; i++) {
            html += `<div class="table-btn" data-table="${i}">Table ${i}</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.table-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active-table'));
                btn.classList.add('active-table');
                currentTable = parseInt(btn.getAttribute('data-table'));
            });
        });
        document.querySelector('.table-btn').classList.add('active-table');
    }

    // Afficher les boissons selon le menu sélectionné
    async function displayDrinks() {
        const container = document.getElementById('drinksList');
        const drinksSnapshot = await db.collection('drinks').where('category', '==', currentMenu).get();
        
        let drinks = [];
        if (!drinksSnapshot.empty) {
            drinks = drinksSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } else {
            drinks = DEFAULT_DRINKS[currentMenu] || [];
        }
        
        if (drinks.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#aaa; padding:30px;">Aucune boisson disponible</div>';
            return;
        }
        
        container.innerHTML = drinks.map(drink => `
            <div class="drink-item" data-name="${drink.name}" data-brand="${drink.brand || ''}">
                <div class="drink-info">
                    <div class="drink-name">${drink.name}</div>
                    <div class="drink-brand">${drink.brand || ''}</div>
                </div>
                <div class="drink-add"><i class="fas fa-plus"></i></div>
            </div>
        `).join('');
        
        document.querySelectorAll('.drink-item').forEach(el => {
            el.addEventListener('click', () => {
                const name = el.getAttribute('data-name');
                addToCart(name);
                showToast(`✓ ${name} ajouté`, 1000);
            });
        });
    }

    function addToCart(name) {
        const existing = cart.find(item => item.name === name);
        if (existing) existing.quantity++;
        else cart.push({ name, quantity: 1 });
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        if (cart.length === 0) {
            container.innerHTML = '<div style="color:#aaa; text-align:center;">Aucune boisson</div>';
            return;
        }
        let html = '';
        cart.forEach((item, idx) => {
            html += `
                <div class="cart-item">
                    <span>${item.name} <strong style="color:#D4AF37;">x${item.quantity}</strong></span>
                    <button class="cart-item-remove" data-index="${idx}"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
        });
        container.innerHTML = html;
        document.querySelectorAll('.cart-item-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                cart.splice(idx, 1);
                updateCartUI();
                showToast("Boisson retirée", 800);
            });
        });
    }

    async function confirmOrder() {
        if (cart.length === 0) {
            showToast("Ajoutez une boisson d'abord", 1200);
            return;
        }
        const orderItems = cart.map(item => ({ name: item.name, quantity: item.quantity }));
        const newOrder = {
            table: currentTable,
            items: orderItems,
            status: "pending",
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            createdAt: new Date().toISOString()
        };
        try {
            await db.collection("orders").add(newOrder);
            showToast(`✨ Commande Table ${currentTable} envoyée ! ✨`, 1800);
            cart = [];
            updateCartUI();
        } catch (err) {
            showToast("Erreur, réessayez", 1500);
        }
    }

    // ADMIN - Gestion des produits
    async function loadProducts() {
        const snapshot = await db.collection('drinks').get();
        const container = document.getElementById('productList');
        if (snapshot.empty) {
            container.innerHTML = '<div style="text-align:center; color:#aaa;">Aucun produit, ajoutez-en !</div>';
            return;
        }
        let html = '';
        snapshot.forEach(doc => {
            const product = doc.data();
            html += `
                <div class="product-card">
                    <div class="product-info">
                        <h4>${product.name}</h4>
                        <p>${product.brand || ''} • ${getCategoryName(product.category)}</p>
                    </div>
                    <div class="product-actions">
                        <button class="edit-btn" data-id="${doc.id}" data-name="${product.name}" data-brand="${product.brand}" data-cat="${product.category}"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn" data-id="${doc.id}"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => openEditModal(btn.dataset.id, btn.dataset.name, btn.dataset.brand, btn.dataset.cat));
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (confirm("Supprimer cette boisson ?")) {
                    await db.collection('drinks').doc(btn.dataset.id).delete();
                    loadProducts();
                    displayDrinks();
                    showToast("Produit supprimé", 1000);
                }
            });
        });
    }

    function getCategoryName(cat) {
        const names = { alcool: "Alcoolisées", sucree: "Sucrées", whisky: "Whisky", vin: "Vin", eaux: "Eaux" };
        return names[cat] || cat;
    }

    function openAddModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="color:#D4AF37;">Ajouter une boisson</h3>
                <input type="text" id="prodName" placeholder="Nom de la boisson">
                <input type="text" id="prodBrand" placeholder="Marque / Type">
                <select id="prodCategory">
                    <option value="alcool">Alcoolisées (Bières)</option>
                    <option value="sucree">Sucrées (Sodas, Jus)</option>
                    <option value="whisky">Whisky</option>
                    <option value="vin">Vin / Champagne</option>
                    <option value="eaux">Eaux</option>
                </select>
                <div class="modal-buttons">
                    <button id="saveProduct" style="background:#27AE60; color:white;">Ajouter</button>
                    <button id="closeModal" style="background:#7F8C8D;">Annuler</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('saveProduct').onclick = async () => {
            const name = document.getElementById('prodName').value.trim();
            const brand = document.getElementById('prodBrand').value.trim();
            const category = document.getElementById('prodCategory').value;
            if (!name) { showToast("Nom requis", 1000); return; }
            await db.collection('drinks').add({ name, brand, category });
            modal.remove();
            loadProducts();
            displayDrinks();
            showToast("Boisson ajoutée !", 1000);
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }

    function openEditModal(id, oldName, oldBrand, oldCat) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="color:#D4AF37;">Modifier la boisson</h3>
                <input type="text" id="prodName" value="${oldName}" placeholder="Nom">
                <input type="text" id="prodBrand" value="${oldBrand || ''}" placeholder="Marque">
                <select id="prodCategory">
                    <option value="alcool" ${oldCat === 'alcool' ? 'selected' : ''}>Alcoolisées</option>
                    <option value="sucree" ${oldCat === 'sucree' ? 'selected' : ''}>Sucrées</option>
                    <option value="whisky" ${oldCat === 'whisky' ? 'selected' : ''}>Whisky</option>
                    <option value="vin" ${oldCat === 'vin' ? 'selected' : ''}>Vin</option>
                    <option value="eaux" ${oldCat === 'eaux' ? 'selected' : ''}>Eaux</option>
                </select>
                <div class="modal-buttons">
                    <button id="updateProduct" style="background:#F39C12;">Modifier</button>
                    <button id="closeModal" style="background:#7F8C8D;">Annuler</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('updateProduct').onclick = async () => {
            const name = document.getElementById('prodName').value.trim();
            const brand = document.getElementById('prodBrand').value.trim();
            const category = document.getElementById('prodCategory').value;
            if (!name) return;
            await db.collection('drinks').doc(id).update({ name, brand, category });
            modal.remove();
            loadProducts();
            displayDrinks();
            showToast("Modifié !", 1000);
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }

    // Commandes pour admin
    function listenAdminOrders() {
        db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const container = document.getElementById('adminOrdersList');
            if (!container) return;
            if (snapshot.empty) {
                container.innerHTML = '<div style="text-align:center; color:#aaa;">Aucune commande</div>';
                return;
            }
            let html = '';
            snapshot.forEach(doc => {
                const order = doc.data();
                const status = order.status || "pending";
                html += `
                    <div class="product-card" style="flex-direction:column; align-items:flex-start;">
                        <div style="display:flex; justify-content:space-between; width:100%;">
                            <strong style="color:#D4AF37;">Table ${order.table}</strong>
                            <span style="font-size:0.7rem;">${order.timestamp?.toDate().toLocaleTimeString() || ''}</span>
                        </div>
                        <div style="margin:8px 0;">${order.items.map(i => `${i.name} x${i.quantity}`).join(', ')}</div>
                        <div style="display:flex; gap:8px;">
                            ${status === 'pending' ? `<button class="btn-prepare" data-id="${doc.id}" style="background:#27AE60; padding:5px 12px; border-radius:20px;">Préparer</button>` : ''}
                            ${status === 'confirmed' ? `<button class="btn-serve" data-id="${doc.id}" style="background:#F39C12; padding:5px 12px; border-radius:20px;">Servir</button>` : ''}
                            ${status === 'served' ? '<span style="color:#27AE60;">✓ Servie</span>' : ''}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.querySelectorAll('.btn-prepare').forEach(btn => {
                btn.onclick = async () => await db.collection('orders').doc(btn.dataset.id).update({ status: "confirmed" });
            });
            document.querySelectorAll('.btn-serve').forEach(btn => {
                btn.onclick = async () => await db.collection('orders').doc(btn.dataset.id).update({ status: "served" });
            });
        });
    }

    function showToast(msg, duration = 1500) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    // Navigation
    function initNavigation() {
        const btns = document.querySelectorAll('.nav-btn');
        const pages = {
            home: document.getElementById('homePage'),
            order: document.getElementById('orderPage'),
            admin: document.getElementById('adminPage')
        };
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.getAttribute('data-page');
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                Object.values(pages).forEach(p => p.classList.remove('active-page'));
                pages[page].classList.add('active-page');
                if (page === 'admin') {
                    document.getElementById('adminLoginArea').style.display = adminLogged ? 'none' : 'block';
                    document.getElementById('adminDashboardArea').style.display = adminLogged ? 'block' : 'none';
                    if (adminLogged) { loadProducts(); listenAdminOrders(); }
                }
            });
        });
    }

    // Initialisation
    window.addEventListener('DOMContentLoaded', async () => {
        generateTableButtons();
        await displayDrinks();
        updateCartUI();
        
        document.querySelectorAll('.menu-cat').forEach(cat => {
            cat.addEventListener('click', () => {
                document.querySelectorAll('.menu-cat').forEach(c => c.classList.remove('active-menu'));
                cat.classList.add('active-menu');
                currentMenu = cat.getAttribute('data-menu');
                displayDrinks();
            });
        });
        
        document.getElementById('confirmOrderBtn').addEventListener('click', confirmOrder);
        document.getElementById('startOrderBtn').addEventListener('click', () => document.querySelector('[data-page="order"]').click());
        
        // Admin login
        document.getElementById('loginBtn').addEventListener('click', () => {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASS) {
                adminLogged = true;
                document.getElementById('adminLoginArea').style.display = 'none';
                document.getElementById('adminDashboardArea').style.display = 'block';
                loadProducts();
                listenAdminOrders();
                showToast("Bienvenue gestionnaire", 1500);
            } else showToast("Mot de passe incorrect", 1200);
        });
        document.getElementById('logoutAdmin').addEventListener('click', () => {
            adminLogged = false;
            document.getElementById('adminLoginArea').style.display = 'block';
            document.getElementById('adminDashboardArea').style.display = 'none';
            showToast("Déconnecté", 1000);
        });
        document.getElementById('addProductBtn').addEventListener('click', openAddModal);
        
        initNavigation();
        
        // Initialiser la base avec les produits par défaut si vide
        const drinksSnap = await db.collection('drinks').limit(1).get();
        if (drinksSnap.empty) {
            for (let cat in DEFAULT_DRINKS) {
                for (let drink of DEFAULT_DRINKS[cat]) {
                    await db.collection('drinks').add(drink);
                }
            }
        }
        showToast("🥂 Bienvenue au mariage de Dan & Tina !", 2000);
    });
</script>
</body>
</html>
